<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default " en-US" }}">
{{ partial "head.html" . }}

<body>
  <button class="theme-toggle" aria-label="Toggle Dark Mode" onclick="toggleTheme()">
    <!-- Sun icon -->
    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <!-- Moon icon -->
    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
  <main>
    {{ block "main" . }}
    {{ end }}
  </main>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const savedTheme = localStorage.getItem('theme');
      const isDarkSystem = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const currentTheme = savedTheme || (isDarkSystem ? 'dark' : 'light');
      const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';

      html.setAttribute('data-theme', targetTheme);
      localStorage.setItem('theme', targetTheme);
    }

    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();

    // Mobile TOC Toggle
    function toggleMobileTOC() {
      const overlay = document.getElementById('mobileTocOverlay');
      if (overlay) {
        overlay.classList.toggle('active');
        document.body.style.overflow = overlay.classList.contains('active') ? 'hidden' : '';
      }
    }

    // ScrollSpy for TOC
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const id = entry.target.getAttribute('id');
          if (entry.isIntersecting && id) {
            document.querySelectorAll('#TableOfContents a').forEach(a => a.classList.remove('active'));
            const activeLinks = document.querySelectorAll(`#TableOfContents a[href="#${id}"]`);
            activeLinks.forEach(link => link.classList.add('active'));
          }
        });
      }, { rootMargin: '0px 0px -80% 0px' });

      document.querySelectorAll('h1[id], h2[id], h3[id]').forEach(section => {
        observer.observe(section);
      });

      // Close mobile TOC on link click
      document.querySelectorAll('.mobile-toc-overlay #TableOfContents a').forEach(link => {
        link.addEventListener('click', () => {
          toggleMobileTOC();
        });
      });
    });
  </script>
</body>

</html>
