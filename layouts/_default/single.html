{{ define "main" }}
<article>
  <header style="max-width: 90ch; margin: 0 auto; padding: 5rem 1.5rem 0; text-align: center;">
    <h1 style="font-size: 3rem; margin-bottom: 0.5rem; text-wrap: balance;">{{ .Title }}</h1>
    <div class="metadata" style="margin-bottom: 3rem;">
      Published on {{ .Date.Format "January 2, 2006" }}
    </div>
  </header>

  <div class="content container" style="padding-top: 0; font-size: 1.125rem;">
    {{ .Content }}
  </div>

  <footer class="container"
    style="padding-top: 2rem; border-top: 1px solid var(--metadata-text-color); font-family: var(--font-ui); font-size: 0.9rem;">
    <a href="{{ site.BaseURL }}">Back to Home</a>
  </footer>
</article>
{{ end }}
