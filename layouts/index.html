{{ define "main" }}
<div class="container">
  <header style="margin-bottom: 4rem; text-align: center;">
    <h1 style="font-size: 3rem; margin: 0;">{{ site.Title }}</h1>
  </header>

  <div style="display: flex; flex-direction: column; gap: 3rem;">
    {{ range .Site.RegularPages }}
    <article>
      <h2 style="margin: 0 0 0.5rem 0; font-size: 1.5rem;">
        <a href="{{ .Permalink }}" style="text-decoration: none;">{{ .Title }}</a>
      </h2>
      <div class="metadata">
        Published on {{ .Date.Format "January 2, 2006" }}
      </div>
      {{ if .Summary }}
      <p style="margin-top: 0.5rem;">{{ .Summary }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
