<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  {{ $favicon := site.Params.favicon | default "/favicon.png" }}
  <link rel="icon" href="{{ $favicon }}">
  <link rel="apple-touch-icon" href="{{ $favicon }}">

  <!-- Google Fonts: Newsreader & Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,400&display=swap"
    rel="stylesheet">

  <!-- CSS Design Tokens -->
  {{ $style := resources.Get "css/main.css" }}
  {{ if $style }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  {{ end }}

  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
